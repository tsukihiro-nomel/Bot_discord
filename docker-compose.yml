services:
  sawachi-bot:
    build: .
    container_name: sawachi-bot
    restart: unless-stopped
    env_file: .env
    environment:
      - DATA_DIR=/data
    volumes:
      - sawachi_data:/data
    # Port health en local uniquement (pas exposé au réseau)
    ports:
      - "127.0.0.1:3000:3000"

volumes:
  sawachi_data:
